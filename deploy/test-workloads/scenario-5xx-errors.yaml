# Scenario: HTTP 5xx error rate spike
#
# Pods are healthy/Running, but app returns 5xx errors.
# - /500 always returns 500
# - /502, /503, /504 return respective codes
# - /version returns 504 ~50% of the time (fault injection)
#
# Image: kienlt992/golang-webapp-testing:v5.0.0
# Source: https://github.com/BlackMetalz/Golang-Webapp-Testing
#
# Expected: Pods Running, no crashes, but high 5xx error rate in metrics
# Hypothesis: http_error_spike
# Bot command: /check webapp-testing -n demo-staging
#
# To generate 5xx traffic (via ingress):
#   while true; do curl -s -o /dev/null -w "%{http_code}\n" -H "Host: webapp-testing.local" localhost/500; sleep 0.1; done
# Or via port-forward:
#   kubectl port-forward svc/webapp-testing -n demo-staging 8080:80
#   while true; do curl -s -o /dev/null -w "%{http_code}\n" localhost:8080/500; sleep 0.1; done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-testing
  namespace: demo-staging
  labels:
    app: webapp-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp-testing
  template:
    metadata:
      labels:
        app: webapp-testing
    spec:
      containers:
        - name: webapp
          image: kienlt992/golang-webapp-testing:v5.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-testing
  namespace: demo-staging
  labels:
    app: webapp-testing
spec:
  selector:
    app: webapp-testing
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-testing
  namespace: demo-staging
spec:
  ingressClassName: nginx
  rules:
    - host: webapp-testing.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp-testing
                port:
                  number: 80
