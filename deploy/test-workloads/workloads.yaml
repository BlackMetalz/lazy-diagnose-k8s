# --- Test case: OOMKilled ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: prod
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: polinux/stress
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "512M", "--vm-hang", "1"]
          resources:
            limits:
              memory: "128Mi"
            requests:
              memory: "64Mi"
---
# --- Test case: Pending (insufficient resources) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: prod
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: busybox
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "100"
              memory: "256Gi"
---
# --- Test case: Normal (healthy) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: prod
  labels:
    app: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: busybox
          command: ["sleep", "3600"]
          resources:
            limits:
              memory: "64Mi"
            requests:
              memory: "32Mi"
