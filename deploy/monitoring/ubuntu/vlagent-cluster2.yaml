apiVersion: v1
kind: ServiceAccount
metadata:
  name: vlagent
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vlagent
rules:
  - apiGroups: [""]
    resources: [namespaces, pods, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vlagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vlagent
subjects:
  - kind: ServiceAccount
    name: vlagent
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vlagent
  namespace: monitoring
  labels:
    app: vlagent
spec:
  selector:
    matchLabels:
      app: vlagent
  template:
    metadata:
      labels:
        app: vlagent
    spec:
      serviceAccountName: vlagent
      containers:
        - name: vlagent
          image: victoriametrics/vlagent:v1.48.0
          args:
            - "-kubernetesCollector"
            - "-remoteWrite.url=$(VL_WRITE_URL)"
            - "-remoteWrite.label=cluster=lazy-diag-2"
          env:
            - name: VL_WRITE_URL
              valueFrom:
                configMapKeyRef:
                  name: host-endpoints
                  key: vl_write_url
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
