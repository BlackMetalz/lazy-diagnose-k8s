# vmalert evaluates alerting rules against VictoriaMetrics
# and sends alerts to Alertmanager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: monitoring
  labels:
    app: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmalert
  template:
    metadata:
      labels:
        app: vmalert
    spec:
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.138.0
          args:
            - "--datasource.url=http://host.docker.internal:8428"
            - "--remoteRead.url=http://host.docker.internal:8428"
            - "--remoteWrite.url=http://host.docker.internal:8428"
            - "--notifier.url=http://alertmanager.monitoring.svc:9093"
            - "--rule=/etc/vmalert/rules/*.yml"
            - "--evaluationInterval=15s"
          ports:
            - containerPort: 8880
              name: http
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert/rules
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: rules
          configMap:
            name: alert-rules
