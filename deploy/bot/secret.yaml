# Create this secret before deploying:
#   kubectl create secret generic lazy-diagnose-secrets \
#     --namespace=lazy-diagnose \
#     --from-literal=TELEGRAM_BOT_TOKEN=your-token-here \
#     --from-literal=ANTHROPIC_API_KEY=your-key-here  # optional
#
# Or apply this file after base64-encoding the values:
apiVersion: v1
kind: Secret
metadata:
  name: lazy-diagnose-secrets
  namespace: lazy-diagnose
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  # ANTHROPIC_API_KEY: "REPLACE_ME"  # optional, for LLM summarizer
