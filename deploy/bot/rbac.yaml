apiVersion: v1
kind: ServiceAccount
metadata:
  name: lazy-diagnose-k8s
  namespace: lazy-diagnose
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lazy-diagnose-k8s
rules:
  # Pods: status, logs, events
  - apiGroups: [""]
    resources: [pods, pods/log, events, services, endpoints, namespaces, nodes, persistentvolumeclaims, resourcequotas, limitranges, configmaps]
    verbs: [get, list, watch]
  # Workloads: deployments, statefulsets, daemonsets, replicasets
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  # Jobs
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  # HPA
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lazy-diagnose-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lazy-diagnose-k8s
subjects:
  - kind: ServiceAccount
    name: lazy-diagnose-k8s
    namespace: lazy-diagnose
