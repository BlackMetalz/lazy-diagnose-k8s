services:
  - name: checkout
    aliases: [checkout-service, checkout-api]
    namespace: prod
    primary_resource: deployment/checkout
    selectors:
      app: checkout
    metrics_job: checkout-api
    rollout_target: deployment/checkout

  - name: payment
    aliases: [payment-service, payment-api]
    namespace: prod
    primary_resource: deployment/payment
    selectors:
      app: payment
    metrics_job: payment-api
    rollout_target: deployment/payment

  - name: worker
    aliases: [background-worker, job-worker]
    namespace: prod
    primary_resource: deployment/worker
    selectors:
      app: worker
    metrics_job: worker

  # Test scenarios
  - name: api-config-missing
    namespace: prod
    primary_resource: deployment/api-config-missing
    selectors:
      app: api-config-missing

  - name: api-probe-fail
    namespace: prod
    primary_resource: deployment/api-probe-fail
    selectors:
      app: api-probe-fail

  - name: api-bad-image
    namespace: prod
    primary_resource: deployment/api-bad-image
    selectors:
      app: api-bad-image

  - name: api-dependency-fail
    aliases: [api-dep-fail]
    namespace: prod
    primary_resource: deployment/api-dependency-fail
    selectors:
      app: api-dependency-fail

  - name: ml-worker-taint
    aliases: [ml-worker]
    namespace: prod
    primary_resource: deployment/ml-worker-taint
    selectors:
      app: ml-worker-taint

  - name: db-pvc-pending
    aliases: [db-pvc]
    namespace: prod
    primary_resource: deployment/db-pvc-pending
    selectors:
      app: db-pvc-pending
