telegram:
  token: "" # Set via TELEGRAM_BOT_TOKEN env var
  allowed_chat_ids: [] # Empty = allow all
  alert_chat_ids: []   # Set via TELEGRAM_CHAT_ID env var (comma-separated). Get your chat ID from @userinfobot
  rate_limit:
    max_requests: 10   # max requests per user per window
    window_secs: 60    # window duration in seconds

# Alertmanager webhook receiver
webhook:
  enabled: true
  addr: ":8080"            # HTTP server for receiving webhooks
  bearer_token: ""         # Optional auth token
  cluster_name: "lazy-diag"  # Shown in alert header
  bot_name: "lazy-diagnose-k8s"  # Shown in alert header

# Data source endpoints
providers:
  victoria_metrics_url: "http://localhost:8428"
  victoria_logs_url: "http://localhost:9428"

# Multi-cluster support (optional — omit for single-cluster mode)
# Each cluster needs a kubeconfig context. Metrics/logs are filtered by cluster label.
# clusters:
#   - name: lazy-diag
#     context: kind-lazy-diag
#     default: true
#   - name: lazy-diag-2
#     context: kind-lazy-diag-2

# LLM (optional — bot works without it)
# Any OpenAI-compatible endpoint. Enabled when base_url + model are set.
# Env vars (LLM_BASE_URL, LLM_API_KEY, LLM_MODEL) override these values.
# llm:
#   base_url: https://mkp-api.fptcloud.com/v1    # OpenAI-compatible endpoint
#   api_key: your-key
#   model: gpt-oss-120b
## Example endpoints:
##   Ollama:      http://localhost:11434/v1
##   OpenRouter:  https://openrouter.ai/api/v1
##   OpenAI:      https://api.openai.com/v1
##   Gemini:      https://generativelanguage.googleapis.com/v1beta/openai
##   FPT AI:      https://mkp-api.fptcloud.com/v1

# HolmesGPT deep investigation (optional — agentic root cause analysis)
# Requires 'holmes' CLI installed (pip install holmesgpt)
# Model MUST support function calling (tool use)
# Inherits base_url and api_key from LLM config — only model needs to be set separately
# holmes:
#   enabled: true
#   model: SaoLa3.1-medium                       # "openai/" prefix auto-added, must support tool calling
#   timeout: 120                                  # seconds
#   # base_url: ...                              # optional override, defaults to LLM base_url
#   # api_key: ...                               # optional override, defaults to LLM api_key
## Models tested with FPT AI:
##   SaoLa3.1-medium                 — function calling OK
##   SaoLa-Llama3.1-planner          — function calling OK
##   Qwen2.5-Coder-32B-Instruct      — NO function calling (text only)
## FPT Marketplace models (https://marketplace.fptcloud.com):
##   gpt-oss-120b                    — tool use + structured output (recommended for agentic)
##   DeepSeek-V3.2-Speciale          — 671B, agentic support, max 8K output
##   GLM-4.7                         — agentic + coding (expensive output: $2.20/M)
##   Llama-3.3-70B-Instruct          — cheapest output, no explicit tool calling

mcp:
  kubernetes:
    command: "npx"
    args: ["-y", "@anthropic/kubernetes-mcp-server"]
    timeout: 30
  logs:
    command: "victoria-logs-mcp"
    args: []
    env:
      VICTORIA_LOGS_URL: "http://localhost:9428"
    timeout: 30
  metrics:
    command: "victoria-metrics-mcp"
    args: []
    env:
      VICTORIA_METRICS_URL: "http://localhost:8428"
    timeout: 30
