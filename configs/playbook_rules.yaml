crashloop:
  - id: oom_resource
    name: OOM / Resource exhaustion
    signals:
      - name: termination_oom
        match: "OOMKilled"
        source: k8s
        weight: 40
      - name: memory_near_limit
        match: "memory_usage > 90% limit"
        source: metrics
        weight: 30
      - name: high_restart_count
        match: "restart_count > 5"
        source: k8s
        weight: 20

  - id: config_env_missing
    name: Config / Env missing
    signals:
      - name: env_error_logs
        match: "env not found|config error|missing required|undefined variable"
        source: logs
        weight: 50
      - name: fast_exit
        match: "exit_code != 0 AND runtime < 10s"
        source: k8s
        weight: 20

  - id: dependency_connectivity
    name: Dependency / Connectivity issue
    signals:
      - name: connection_errors
        match: "connection refused|timeout|ECONNREFUSED|dial tcp"
        source: logs
        weight: 40
      - name: multiple_containers_affected
        match: "affected_containers > 1"
        source: k8s
        weight: 20

  - id: probe_issue
    name: Probe misconfiguration
    signals:
      - name: probe_failed_event
        match: "Liveness probe failed|Readiness probe failed"
        source: k8s
        weight: 50
      - name: running_but_restarting
        match: "state=running AND restart_count > 0"
        source: k8s
        weight: 20

  - id: bad_image
    name: Bad image / Startup failure
    signals:
      - name: image_pull_error
        match: "ErrImagePull|ImagePullBackOff|ErrImageNeverPull"
        source: k8s
        weight: 60
      - name: never_started
        match: "container_started = false"
        source: k8s
        weight: 30

pending:
  - id: insufficient_resources
    name: Insufficient cluster resources
    signals:
      - name: failedscheduling_event
        match: "FailedScheduling|Insufficient cpu|Insufficient memory"
        source: k8s
        weight: 60
      - name: no_nodes_available
        match: "nodes are available|no nodes available|Preemption is not helpful"
        source: k8s
        weight: 30

  - id: taint_mismatch
    name: Taint / Toleration mismatch
    signals:
      - name: taint_event
        match: "had taint|untolerated taint"
        source: k8s
        weight: 60

  - id: affinity_issue
    name: Affinity / NodeSelector issue
    signals:
      - name: affinity_event
        match: "didn't match Pod's node affinity|node selector"
        source: k8s
        weight: 60

  - id: pvc_binding
    name: PVC binding issue
    signals:
      - name: pvc_pending
        match: "unbound PersistentVolumeClaims|PVC pending"
        source: k8s
        weight: 60

  - id: quota_issue
    name: Quota exceeded
    signals:
      - name: quota_event
        match: "exceeded quota|forbidden.*quota"
        source: k8s
        weight: 60

rollout_regression:
  - id: release_regression
    name: Release caused regression
    signals:
      - name: error_rate_spike
        match: "error_rate_after > 2 * error_rate_before"
        source: metrics
        weight: 40
      - name: pods_not_ready
        match: "ready_replicas < desired_replicas"
        source: k8s
        weight: 30
      - name: image_pull_failure
        match: "ErrImagePull|ImagePullBackOff"
        source: k8s
        weight: 30
      - name: rollout_stuck_events
        match: "Back-off pulling image|Failed to pull image|ErrImagePull"
        source: k8s
        weight: 20

  - id: dependency_exposed
    name: Dependency issue exposed by release
    signals:
      - name: dependency_errors_in_logs
        match: "connection refused|timeout|503"
        source: logs
        weight: 40
      - name: error_rate_gradual
        match: "error_rate_increase < 2x"
        source: metrics
        weight: 20

  - id: traffic_spike_unrelated
    name: Traffic spike (unrelated to release)
    signals:
      - name: request_rate_spike
        match: "request_rate > 2 * baseline"
        source: metrics
        weight: 40
      - name: no_new_revision
        match: "revision unchanged"
        source: k8s
        weight: 30

  - id: resource_pressure
    name: Resource pressure after release
    signals:
      - name: cpu_throttling
        match: "cpu_usage > 90% limit"
        source: metrics
        weight: 40
      - name: memory_pressure
        match: "memory_usage > 85% limit"
        source: metrics
        weight: 30
